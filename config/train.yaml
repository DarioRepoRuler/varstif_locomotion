defaults:
  - _self_
  - policy: ppo

env:
  action_scale: 0.3
  control_mode: "VIC_2"

  physics_steps_per_control_step: 4 # corresponds to 50Hz

  num_history_actor: 1 # number of previous observations to stack
  num_history_critic: 1 # number of previous observations to stack
  kick_vel: 0.5
  push_interval: 75
  is_training: True
  episode_length: 500

  single_obs_size: 48
  single_obs_size_priv: 59

  domain_rand:
    randomisation: True
    gravity_offset: [-1., 1.]
    friction_range: [0.3, 1.25]
    payload_range: [-1., 3.]
    hip_mass_range: [-0.3, 0.3]
    kp_range: [0.8, 1.3]
    kd_range: [0.5, 1.5]
    motor_strength_range: [0.9, 1.1]
    
    local_v_noise: 0.1
    local_w_noise: 0.2
    joint_noise: 0.01
    joint_vel_noise: 1.5
    gravity_noise: 0.05

  normalization:
    local_v_scale: 2.0
    local_w_scale: 0.25
    joint_vel_scale: 0.1
    command_scale: 2.0

  control_range: {
    'cmd_x': [-0.6, 1.0],
    'cmd_y': [-0.5, 0.5],
    'cmd_ang': [-0.7, 0.7]
  }

  manual_control:
    enable: False
    cmd_x: 0.8
    cmd_y: 0.0
    cmd_ang: 0.0

  reset_pos_x: [-5.0, 5.0]
  reset_pos_y: [-5.0, 5.0]

  control:
    stiff_range: [0.5, 2.0]
    p_gain: 50.0
    d_gain: 1.0

  reward_scales: { 
          'tracking_lin_vel': 1.5, 
          'tracking_ang_vel': 0.8, 
          'lin_vel_z': -2.0, 
          'ang_vel_xy': -0.05, 
          'orientation': -5.0, 
          'feet_air_time': 0.2,
          'termination': -10.0,
          'stand_still': -0.5, 
          "foot_slip": -0.1,
          "action_rate": -0.0,
          'rew_pos_limits': -0.0,
          "rew_acceleration": -2.5e-7,
          "rew_collision": -10.0,
          "rew_power": -2.e-5,
          "rew_power_distro": -5.e-6,
          "hip": 0.05,
          "rew_joint_track": -0.1,
          'rew_stiff_default': 0.0 
  }

log: True

ckpt_path: null #'outputs/2024-09-23/14-32-09/checkpoints/model_2000.pt' 

log_dir: "Documents/TALocoMotion/outputs/"


num_envs: 2000

timesteps_per_rollout: 48
num_learning_iterations: 4001
device: 'cuda:0'

curriculum: False
viz: False

project: 'VIC Controlled'
group: Bruce-P2
scene_xml: 'unitree_go2/flat.xml' 