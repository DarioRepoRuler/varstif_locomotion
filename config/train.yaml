defaults:
  - _self_
  - policy: ppo

env:
  action_scale: 0.5
  action_stiff_scale: 1.0
  hip_scale: 0.6
  control_mode: "VIC_2"
  physics_steps_per_control_step: 4 # corresponds to 50Hz
  sample_command_interval: 250

  num_history_actor: 1 # number of previous observations to stack
  num_history_critic: 1 # number of previous observations to stack
  kick_vel: 0.0
  push_interval: 100
  is_training: True
  episode_length: 500

  terminate_geoms: ["base_0", "base_1", "base_2", "FR_hip","FL_hip","RR_hip","RL_hip"]
  body_penalty_geom: ["base_0", "base_1", "base_2", "FR_hip", "FR_thigh", "FL_hip", "FL_thigh", "RR_hip", "RR_thigh", "RL_hip", "RL_thigh"]

  # Force kick in test
  enable_force_kick: True
  impulse_force_kick: True

  force_kick_duration: 0.1
  force_kick_impulse: [8.0, 15.0]
  force_kick_interval: 300
  kick_force: [50.0, 150.0]

  single_obs_size: 48
  single_obs_size_priv: 59

  domain_rand:
    randomisation: True
    gravity_offset: [-1., 1.]
    friction_range: [0.3, 1.25]
    payload_range: [-1., 3.]
    hip_mass_range: [-0.3, 0.3]
    kp_range: [0.8, 1.3]
    kd_range: [0.5, 1.5]
    motor_strength_range: [0.9, 1.1]
    
    local_v_noise: 0.1
    local_w_noise: 0.2
    joint_noise: 0.01
    joint_vel_noise: 1.5
    gravity_noise: 0.05

  normalization:
    local_v_scale: 2.0
    local_w_scale: 0.25
    joint_vel_scale: 0.1
    command_scale: 2.0

  control_range: {
    'cmd_x': [-1.0, 1.0],
    'cmd_y': [-1.0, 1.0],
    'cmd_ang': [-1.0, 1.0]
  }

  manual_control:
    enable: False
    task: 'experiments'
    cmd_x: 0.8
    cmd_y: 0.0
    cmd_ang: 0.0

  reset_pos_x: [-5.0, 5.0]
  reset_pos_y: [-5.0, 5.0]
  reset_theta: [0, 0.3926990]
  reset_a_x: [-1,1]
  reset_a_y: [-1,1]

  control:
    stiff_range: [0.5, 2.0]
    p_gain: 25.0
    d_gain: 0.6

  contacts:
    total: 23

  reward_scales: { 
          'tracking_lin_vel': 1.5, 
          'tracking_ang_vel': 0.8, 
          'lin_vel_z': -2.0, 
          'ang_vel_xy': -0.05, 
          'orientation': -5.0,
          'stand_still': -0.5, 
          'feet_air_time': 0.5,
          'termination': -10.0,
          'foot_slip': -0.1,
          'action_rate': -0.002,
          'rew_limits': -0.02,
          'rew_acceleration': -2.5e-7,
          'rew_collision': -10.0,
          'rew_power': -2.e-6,
          "hip": 0.05,
          #'rew_foot_clearance': -0.01,
          'rew_joint_track': -0.05,
  }

log: True

ckpt_path: outputs/2024-11-15/08-27-56/checkpoints/model_950.pt

log_dir: projects/TALocomotion/outputs/

num_envs: 4096
timesteps_per_rollout: 48
num_learning_iterations: 2001
device: 'cuda:0'

curriculum: False
viz: True

project: 'TALocoMotion'
group: ${env.control_mode}
scene_xml: 'unitree_go2/flat.xml'