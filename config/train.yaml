defaults:
  - _self_
  - policy: ppo

env:
  action_scale: 0.3
  control_mode: "P"
  physics_steps_per_control_step: 4 # corresponds to 50Hz

  num_history: 15 # number of previous observations to stack
  kick_vel: 0.5
  push_interval: 25
  is_training: True
  episode_length: 500

  domain_rand:
    randomisation: True
    gravity_offset: [0., 0.]
    friction_range: [0.3, 1.25]
    payload_range: [-1., 1.]
    hip_mass_range: [-0.3, 0.3]
    kp_range: [0.8, 1.3]
    kd_range: [0.5, 1.5]
    motor_strength_range: [0.9, 1.1]

    local_v_noise: 0.1
    local_w_noise: 0.2
    joint_noise: 0.01
    joint_vel_noise: 1.5
    gravity_noise: 0.05

  normalization:
    local_v_scale: 2.0
    local_w_scale: 0.25
    joint_vel_scale: 0.1
    command_scale: 2.0

  manual_control:
    enable: False
    cmd_x: 0.8
    cmd_y: 0.0
    cmd_ang: 0.0


log: True

ckpt_path: null

log_dir: "Documents/TALocoMotion/outputs/"


num_envs: 4096

timesteps_per_rollout: 48
num_learning_iterations: 2001
device: 'cuda:0'

curriculum: False
viz: False

project: PositionControlled
group: Bruce-P2
scene_xml: 'unitree_go2/flat.xml' 