defaults:
  - _self_
  - policy: ppo

env:
  action_scale: 0.3
  control_mode: "P"
  physics_steps_per_control_step: 4
  obs_noise: 0.01
  act_noise: 0.01
  num_history: 1
  kick_vel: 0.1
  push_interval: 25
  is_training: False
  episode_length: 1000

  domain_rand:
    randomisation: False
    gravity_offset: [-1., 1.]
    friction_range: [0.4, 1.25]
    payload_range: [-1., 1.]
    local_v_noise: 0.1
    local_w_noise: 0.2
    joint_noise: 0.01
    joint_vel_noise: 1.5
    gravity_noise: 0.05

  # normalization:
  #   local_v_scale: 2.0
  #   local_w_scale: 0.25
  #   joint_vel_scale: 0.1

  manual_control:
    enable: False
    cmd_x: 0.8
    cmd_y: 0.0
    cmd_ang: 0.0



ckpt_path: 'outputs/model_1550.pt'
timesteps_per_rollout: 24
num_iterations: 5
num_envs: 1

device: 'cuda:0'
randomisation: False
curriculum: False
scene_xml: 'unitree_go2/flat.xml'