defaults:
  - _self_
  - policy: ppo

env:
  action_scale: 0.3
  control_mode: "P"
  physics_steps_per_control_step: 4

  num_history: 1
  kick_vel: 1.0
  push_interval: 50
  is_training: False
  episode_length: 500

  domain_rand:
    randomisation: False
    gravity_offset: [-1., 1.]
    friction_range: [0.4, 1.25]
    payload_range: [-1., 1.]
    hip_mass_range: [-0.3, 0.3]
    local_v_noise: 0.1
    local_w_noise: 0.2
    joint_noise: 0.01
    joint_vel_noise: 1.5
    gravity_noise: 0.05
    kp_range: [0.8, 1.3]
    kd_range: [0.5, 1.5]
    motor_strength_range: [0.9, 1.1]

  normalization:
    local_v_scale: 2.0
    local_w_scale: 0.25
    joint_vel_scale: 0.1
    command_scale: 2.0

  manual_control:
    enable: True
    cmd_x: 1.0
    cmd_y: 0.0
    cmd_ang: -0.0



ckpt_path: 'best_models/testo.pt'
timesteps_per_rollout: 48
num_iterations: 100
num_envs: 1

device: 'cuda:0'
curriculum: False
scene_xml: 'unitree_go2/terrain_multi.xml'