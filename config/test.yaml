defaults:
  - _self_
  - policy: ppo

env:
  action_scale: 0.3
  control_mode: "P"
  physics_steps_per_control_step: 4

  num_history_actor: 1 # number of previous observations to stack
  num_history_critic: 1 # number of previous observations to stack
  kick_vel: 1.5
  push_interval: 100
  is_training: False
  episode_length: 750

  single_obs_size: 48
  single_obs_size_priv: 48

  domain_rand:
    randomisation: True
    gravity_offset: [-1., 1.]
    friction_range: [0.3, 1.25]
    payload_range: [-1., 3.]
    hip_mass_range: [-0.3, 0.3]
    kp_range: [0.8, 1.3]
    kd_range: [0.5, 1.5]
    motor_strength_range: [0.9, 1.1]

    local_v_noise: 0.1
    local_w_noise: 0.2
    joint_noise: 0.01
    joint_vel_noise: 1.5
    gravity_noise: 0.05

  normalization:
    local_v_scale: 2.0
    local_w_scale: 0.25
    joint_vel_scale: 0.1
    command_scale: 2.0

  manual_control:
    enable: True
    cmd_x: 0.8
    cmd_y: 0.0
    cmd_ang: 0.0

  reset_pos_x: [-0.0, 0.0]
  reset_pos_y: [-0.0, 0.0]

  control:
    stiff_range: [0.5, 2.0]
    p_gain: 50.0
    d_gain: 1.0


ckpt_path: 'best_models/rando_all1.pt' #'best_models/test_vic_2_20_1.pt' #'outputs/2024-09-19/16-56-36/checkpoints/model_2000.pt' #'best_models/test_vic1.pt' #'best_models/test_vic_2_oldpose.pt' #'best_models/test_pos_priv.pt' # # #'best_models/test_p_oldpose.pt' # #  # #'outputs/2024-09-16/18-45-14/checkpoints/model_2000.pt' # ## #'best_models/test_vic1.pt' #
timesteps_per_rollout: 50
num_iterations: 17
num_envs: 200


viz: True
device: 'cuda:0'
curriculum: False
scene_xml: 'unitree_go2/flat.xml'