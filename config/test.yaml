defaults:
  - _self_
  - policy: ppo

env:
  action_scale: 0.3
  control_mode: "P"
  physics_steps_per_control_step: 4
  obs_noise: 0.01
  act_noise: 0.01
  num_history: 1
  kick_vel: 0.1
  push_interval: 50
  is_training: False
  manual_control: True
  cmd_x: 1.0
  cmd_y: 0.0
  cmd_ang: 0.0
  episode_length: 1000

#ckpt_path: 'outputs/2024-06-14/13-43-20/checkpoints/model_4750.pt'
#ckpt_path: 'best_models/revised_model.pt'
#ckpt_path: 'best_models/new_info_st.pt'
ckpt_path: 'outputs/2024-07-30/09-39-13/checkpoints/model_800.pt'
timesteps_per_rollout: 24
num_iterations: 5
num_envs: 1

device: 'cuda:0'
randomisation: True
curriculum: False
scene_xml: 'unitree_go2/flat.xml'