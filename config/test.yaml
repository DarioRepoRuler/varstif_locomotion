defaults:
  - _self_
  - policy: ppo

env:
  action_scale: 0.3
  control_mode: "VIC_4"
  physics_steps_per_control_step: 4
  sample_command_interval: 100

  num_history_actor: 1 # number of previous observations to stack
  num_history_critic: 1 # number of previous observations to stack
  kick_vel: 0.0
  push_interval: 100

  # Force kick in test
  enable_force_kick: False
  force_kick_duration: 0.1
  force_kick_interval: 150
  kick_force: 600.0

  is_training: False
  episode_length: 3250

  single_obs_size: 48
  single_obs_size_priv: 59

  domain_rand:
    randomisation: True
    gravity_offset: [-1., 1.]
    friction_range: [0.3, 1.25]
    payload_range: [-1., 3.]
    hip_mass_range: [-0.3, 0.3]
    kp_range: [0.8, 1.3]
    kd_range: [0.5, 1.5]
    motor_strength_range: [0.9, 1.1]

    local_v_noise: 0.1
    local_w_noise: 0.2
    joint_noise: 0.01
    joint_vel_noise: 1.5
    gravity_noise: 0.05

  normalization:
    local_v_scale: 2.0
    local_w_scale: 0.25
    joint_vel_scale: 0.1
    command_scale: 2.0
  
  control_range: {
    'cmd_x': [-0.6, 1.0],
    'cmd_y': [-0.5, 0.5],
    'cmd_ang': [-0.7, 0.7]
  }

  manual_control:
    enable: True
    task: 'experiments' # can be either 'force push', 'experiments' , 'escape pyramids' ,'track trajectory'
    cmd_x: 0.8
    cmd_y: 0.0
    cmd_ang: 0.0

  reset_pos_x: [-0.0, 0.0]
  reset_pos_y: [-0.0, 0.0]

  control:
    stiff_range: [0.5, 2.0]
    p_gain: 50.0
    d_gain: 1.0
  
  reward_scales: { 
          'tracking_lin_vel': 1.5, 
          'tracking_ang_vel': 0.8, 
          'lin_vel_z': -2.0, 
          'ang_vel_xy': -0.05, 
          'orientation': -5.0, 
          'feet_air_time': 0.2,
          'termination': -10.0,
          'stand_still': -0.5, 
          "foot_slip": -0.1,
          "action_rate": -0.0,
          'rew_pos_limits': -0.0,
          "rew_acceleration": -2.5e-7,
          "rew_collision": -10.0,
          "rew_power": -2.e-5,
          "rew_power_distro": -5.e-6,
          "hip": 0.05,
          "rew_joint_track": -0.1,
          'rew_stiff_default': 0.0,
          'rew_base_height': -0.6,
          #'rew_foot_tracking': -0.6,
  }
 
success_threshold: 0.78125
rollouts_per_experiment: 8

ckpt_path: 'best_models/test_vic4_bigscale.pt'  #'best_models/rando_all1.pt' #'best_models/test_vic2_jt_harder.pt' #'best_models/rando_all1.pt' #'best_models/test_vic2_jt_harder.pt' #'best_models/test_vic3_jt.pt' # 'best_models/test_vic2_bf.pt' # #'best_models/test_vic_2_20_1.pt' #'outputs/2024-09-19/16-56-36/checkpoints/model_2000.pt' #'best_models/test_vic1.pt' #'best_models/test_vic_2_oldpose.pt' #'best_models/test_pos_priv.pt' # # #'best_models/test_p_oldpose.pt' # #  # #'outputs/2024-09-16/18-45-14/checkpoints/model_2000.pt' # ## #'best_models/test_vic1.pt' #
result_name: 'results_vic4_bigscale.csv'
timesteps_per_rollout: 50
num_iterations: 65
num_envs: 1

viz: True
device: 'cuda:0'
curriculum: False
scene_xml: 'unitree_go2/flat.xml'